name: SnapshotCheck
options:
  bundleIdPrefix: dev.sweetpad
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    branch: main
targets:
  SnapshotCheck:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: SnapshotPreviews
        product: PreviewGallery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.SnapshotCheck
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEAD_CODE_STRIPPING: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
