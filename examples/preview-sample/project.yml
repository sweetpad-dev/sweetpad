name: PreviewSample
options:
  bundleIdPrefix: dev.sweetpad
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  PreviewSample:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.PreviewSample
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEAD_CODE_STRIPPING: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
