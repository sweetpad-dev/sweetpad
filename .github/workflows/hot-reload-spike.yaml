name: hot-reload-spike

# TEMPORARY — Milestone-1 validation for built-in hot reload (CLI_DESIGN §9d).
# Proves the InjectionNext :8887 socket protocol + single-file recompile/load
# on a real simulator. Remove once the approach lands in the CLI proper.
on:
  push:
    branches: [claude/cli-hot-reloading-c52yf2]
    paths:
      - "sweetpad-lib/ci/hot-reload-spike/**"
      - ".github/workflows/hot-reload-spike.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    name: socket + recompile/load on a fixture app
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        working-directory: sweetpad-lib
        run: rustup show

      - name: Tooling versions
        run: |
          xcodebuild -version
          rustc --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run the hot-reload spike
        run: bash sweetpad-lib/ci/hot-reload-spike/run-spike.sh

      - name: Upload spike artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-reload-spike-logs
          path: |
            sweetpad-lib/ci/hot-reload-spike/.work/build.log
            sweetpad-lib/ci/hot-reload-spike/.work/app-log.txt
          if-no-files-found: ignore
