name: xtool-linux-build

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/xtool-linux-build.yaml"
  workflow_dispatch:

# End-to-end verification of the xtool backend (the Linux build story):
#
#   1. build-darwin-sdk (macOS) — only the Mac has Xcode, so this job builds the
#      Darwin Swift SDK bundle xtool needs and uploads it as an artifact. It also
#      dumps `xtool sdk build --help` so we know its exact input.
#   2. linux-generate   (Linux) — builds the `sweetpad` CLI and runs
#      `sweetpad build generate --backend xtool` against a committed fixture,
#      asserting it writes Package.swift + xtool.yml. Proves the generator works
#      on Linux with NO Mac. This is the reliable signal.
#   3. linux-build      (Linux arm64, swift container) — installs the Darwin
#      Swift SDK from the artifact, installs xtool, and cross-compiles the iOS
#      app with `xtool dev build`. BEST-EFFORT: depends on the Mac-built SDK
#      bundle being usable from a Linux host.
#
# Jobs 1 and 2 run in parallel; job 3 needs both.

jobs:
  build-darwin-sdk:
    name: build Darwin Swift SDK (macOS)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Tooling versions
        run: xcodebuild -version

      - name: Install xtool
        run: brew install xtool-org/tap/xtool

      - name: xtool SDK interface (diagnostics)
        run: |
          set -euo pipefail
          xtool --version
          # The exact input xtool needs to build the Darwin SDK — the key unknown.
          xtool sdk --help || true
          xtool sdk build --help || true
          xtool sdk install --help || true

      # Best-effort: produce the Darwin Swift SDK without an Xcode.xip, using the
      # runner's installed Xcode. stdin is closed so any interactive prompt fails
      # fast instead of hanging. We try a few plausible forms; the diagnostics
      # above record the real interface if all fail.
      - name: Build the Darwin Swift SDK from the installed Xcode
        run: |
          set -uo pipefail
          xtool sdk build "/Applications/Xcode.app" </dev/null \
            || xtool sdk build "$(xcode-select -p)" </dev/null \
            || xtool sdk build </dev/null \
            || xtool sdk install </dev/null \
            || true
          swift sdk list || true

      - name: Package the Swift SDK bundle
        run: |
          set -euo pipefail
          SDK_DIR="$HOME/.swiftpm/swift-sdks"
          if [ ! -d "$SDK_DIR" ] || [ -z "$(ls -A "$SDK_DIR" 2>/dev/null)" ]; then
            echo "::error::No Swift SDK was produced — xtool sdk build likely requires an Xcode.xip."
            echo "See the 'xtool SDK interface' step above for the exact requirement."
            exit 1
          fi
          ls -la "$SDK_DIR"
          tar -C "$HOME/.swiftpm" -czf "$RUNNER_TEMP/swift-sdks.tgz" swift-sdks

      - name: Upload Swift SDK bundle
        uses: actions/upload-artifact@v4
        with:
          name: darwin-swift-sdk
          path: ${{ runner.temp }}/swift-sdks.tgz
          if-no-files-found: error

  linux-generate:
    name: generate xtool config (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Build the sweetpad CLI
        run: cargo build --bin sweetpad

      - name: Generate xtool config from the Xcode project
        env:
          PROJECT: fixtures/_synthetic-strcat/project/StringCatGen.xcodeproj
        run: ./target/debug/sweetpad --project "$PROJECT" build generate --backend xtool

      - name: Assert the generated config
        working-directory: sweetpad-lib/fixtures/_synthetic-strcat/project
        run: |
          set -euo pipefail
          test -f Package.swift
          test -f xtool.yml
          echo "----- Package.swift -----"; cat Package.swift
          echo "----- xtool.yml -----";     cat xtool.yml
          grep -q '\.library(name: "StringCatGen"' Package.swift
          grep -q 'bundleID: dev.sweetpad.fixture.StringCatGen' xtool.yml

      - name: Upload generated package
        uses: actions/upload-artifact@v4
        with:
          name: xtool-package
          path: sweetpad-lib/fixtures/_synthetic-strcat/project
          if-no-files-found: error

  linux-build:
    name: cross-build with xtool (Linux, best-effort)
    # arm64 runner: xtool only ships an aarch64 Linux AppImage.
    runs-on: ubuntu-24.04-arm
    needs: [build-darwin-sdk, linux-generate]
    container: swift:6.1
    # The swift image defaults to dash, which lacks `pipefail`; force bash.
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends git curl ca-certificates libssl-dev pkg-config file

      - name: Download generated package
        uses: actions/download-artifact@v4
        with:
          name: xtool-package
          path: app

      - name: Download Darwin Swift SDK (built on macOS)
        uses: actions/download-artifact@v4
        with:
          name: darwin-swift-sdk
          path: sdk

      - name: Install the Darwin Swift SDK
        run: |
          set -euo pipefail
          # The "mounted frameworks": install the Mac-built bundle where SwiftPM
          # looks for Swift SDKs ($HOME/.swiftpm/swift-sdks).
          mkdir -p "$HOME/.swiftpm"
          tar -C "$HOME/.swiftpm" -xzf sdk/swift-sdks.tgz
          ls -la "$HOME/.swiftpm/swift-sdks"
          swift sdk list

      - name: Install xtool (AppImage)
        run: |
          set -euo pipefail
          assets="$(curl -fsSL https://api.github.com/repos/xtool-org/xtool/releases/latest \
                     | grep -oE 'https://[^"]+\.AppImage')"
          url="$(echo "$assets" | grep -i "$(uname -m)" | head -1 || true)"
          [ -z "$url" ] && url="$(echo "$assets" | head -1)"
          echo "Downloading $url"
          curl -fsSL -o /tmp/xtool.AppImage "$url"
          chmod +x /tmp/xtool.AppImage
          ( cd /opt && /tmp/xtool.AppImage --appimage-extract >/dev/null )
          if [ -x /opt/squashfs-root/usr/bin/xtool ]; then
            ln -sf /opt/squashfs-root/usr/bin/xtool /usr/local/bin/xtool
          else
            ln -sf /opt/squashfs-root/AppRun /usr/local/bin/xtool
          fi
          xtool --version

      - name: Cross-compile the iOS app
        working-directory: app
        run: |
          set -euo pipefail
          xtool dev build
