name: workspace-oracle

on:
  push:
    branches: [main]
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/workspace-oracle.yaml"
  pull_request:
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/workspace-oracle.yaml"
  workflow_dispatch:

# Differential oracle / regression gate for issue #265
# (https://github.com/sweetpad-dev/sweetpad/issues/265).
#
# Runs real `xcodebuild -workspace … -showBuildSettings` as the ground truth and
# compares the in-process resolver's BUILD_DIR against it, on a fixture whose
# member project is nested two dirs below the workspace — the exact topology
# from the report (workspace `Apps`, project `XCodeTarget`).
#
# The resolver must key DerivedData by the workspace Xcode opened (`Apps-<hash>`),
# not the member project (`XCodeTarget-<hash>`). This job is RED if that
# regresses — it was the original proof of the bug and now guards the fix.
jobs:
  oracle:
    name: workspace DerivedData container differential
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Installs the channel + Apple targets pinned in rust-toolchain.toml.
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Tooling versions
        run: |
          xcodebuild -version
          rustc --version

      - name: Build the sweetpad CLI
        run: cargo build --bin sweetpad

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the nested fixture project
        working-directory: sweetpad-lib/ci/fixture-workspace/Modules/App
        run: xcodegen generate

      - name: Workspace DerivedData oracle
        env:
          SWEETPAD_BIN: ${{ github.workspace }}/sweetpad-lib/target/debug/sweetpad
        # Steps inherit `working-directory: sweetpad-lib`, so the path is relative to it.
        run: bash ci/workspace-oracle.sh
