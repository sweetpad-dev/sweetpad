name: cli-smoke

on:
  push:
    branches: [main]
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/cli-smoke.yaml"
  pull_request:
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/cli-smoke.yaml"
  workflow_dispatch:

# End-to-end smoke test of the standalone `sweetpad` CLI against a real,
# generated iOS app on a macOS runner with Xcode. This is the *runtime*
# counterpart to the in-crate unit tests (which pin arg vectors and JSON
# parsers without Xcode): here the commands actually drive xcodebuild + simctl.
jobs:
  smoke:
    name: build · run · test on a fixture app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Installs the channel + Apple targets pinned in rust-toolchain.toml.
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Tooling versions
        run: |
          xcodebuild -version
          rustc --version

      - name: Build the sweetpad CLI
        run: cargo build --bin sweetpad

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the fixture project
        working-directory: sweetpad-lib/ci/fixture-app
        run: xcodegen generate

      - name: Smoke-test the CLI against the fixture app
        working-directory: sweetpad-lib/ci/fixture-app
        run: |
          set -euxo pipefail
          BIN="$GITHUB_WORKSPACE/sweetpad-lib/target/debug/sweetpad"
          PROJ="SweetpadCIApp.xcodeproj"

          # --- explorers (no build needed) ---
          "$BIN" scheme list --project "$PROJ"
          "$BIN" project info --project "$PROJ"
          "$BIN" settings show --project "$PROJ" --scheme SweetpadCIApp --key PRODUCT_BUNDLE_IDENTIFIER
          "$BIN" simulator list --json > /dev/null
          "$BIN" bsp init --project "$PROJ"
          test -f buildServer.json
          "$BIN" completions zsh > /dev/null

          # --- pick an available iOS simulator destination via the CLI itself ---
          DEST=$("$BIN" destination list --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['destinations']; print(next(x['destination'] for x in d if x['kind']=='simulator' and x['os']=='iOS'))")
          echo "Using destination: $DEST"
          UDID="${DEST##*id=}"

          # Boot it up front so install/launch don't race the boot.
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true

          # --- the real dev loop: build, test, run ---
          "$BIN" build start --project "$PROJ" --scheme SweetpadCIApp --destination "$DEST"
          "$BIN" test run --project "$PROJ" --scheme SweetpadCIApp --destination "$DEST" --json
          "$BIN" app run --project "$PROJ" --scheme SweetpadCIApp --destination "$DEST" --no-logs
