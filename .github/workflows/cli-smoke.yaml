name: cli-smoke

on:
  push:
    branches: [main]
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/cli-smoke.yaml"
  pull_request:
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/cli-smoke.yaml"
  workflow_dispatch:

# End-to-end smoke test of the standalone `sweetpad` CLI against a real,
# generated iOS app on a macOS runner with Xcode. This is the *runtime*
# counterpart to the in-crate unit tests (which pin arg vectors and JSON
# parsers without Xcode): here the commands actually drive xcodebuild + simctl.
jobs:
  smoke:
    name: build · run · test on a fixture app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Installs the channel + Apple targets pinned in rust-toolchain.toml.
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Tooling versions
        run: |
          xcodebuild -version
          rustc --version

      - name: Build the sweetpad CLI
        run: cargo build --bin sweetpad

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the fixture project
        working-directory: sweetpad-lib/ci/fixture-app
        run: xcodegen generate

      - name: End-to-end CLI coverage (app + Swift package)
        env:
          SWEETPAD_BIN: ${{ github.workspace }}/sweetpad-lib/target/debug/sweetpad
        run: bash sweetpad-lib/ci/smoke.sh
