on:
  push:
    tags:
      # Extension releases only — the CLI uses cli-v* tags (see cli-release.yaml).
      - "v*"
  # Manual runs (Actions tab) exercise build + sign + notarize without publishing,
  # since the deploy jobs below are gated on a tag ref.
  workflow_dispatch:

permissions:
  contents: write

name: Deploy Extension
jobs:
  build:
    name: Build VSIX (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Rust toolchain
        working-directory: sweetpad-lib
        # Installs the channel + Apple targets pinned in sweetpad-lib/rust-toolchain.toml
        run: rustup show
      - name: Install Dependencies
        run: npm ci

      - name: Build extension bundle
        working-directory: sweetpad-vscode
        # Builds the universal .node addon into out/ so it exists for signing;
        # the packaging step below reuses out/ without rebuilding.
        run: npm run vscode:prepublish

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Codesign the addon
        working-directory: sweetpad-vscode
        # Developer ID + hardened runtime + secure timestamp, required for notarization.
        run: |
          set -euo pipefail
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          test -n "$IDENTITY"
          for f in out/lib/*.node; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f"
            codesign --verify --strict --verbose=2 "$f"
          done

      - name: Notarize the addon
        working-directory: sweetpad-vscode
        env:
          MACOS_NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          ZIP="$RUNNER_TEMP/notarize.zip"
          echo "$MACOS_NOTARY_KEY_P8" | base64 --decode > "$KEY_PATH"
          # A loose Mach-O can't be stapled, so notarytool only registers each binary's
          # hash with Apple; Gatekeeper verifies online when the file is quarantined.
          /usr/bin/zip -j "$ZIP" out/lib/*.node
          xcrun notarytool submit "$ZIP" --key "$KEY_PATH" --key-id "$MACOS_NOTARY_KEY_ID" --issuer "$MACOS_NOTARY_ISSUER_ID" --wait
          rm -f "$KEY_PATH"

      - name: Package VSIX
        working-directory: sweetpad-vscode
        # Drop the prepublish hook so vsce zips the signed out/ instead of rebuilding it,
        # then move the .vsix to the repo root for the upload/deploy steps.
        run: |
          set -euo pipefail
          npm pkg delete 'scripts.vscode:prepublish'
          npx --yes @vscode/vsce package --no-dependencies
          mv ./*.vsix ..

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

  deploy-ovsx:
    name: Deploy to Open VSX
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Resolve VSIX path
        id: vsix
        run: echo "path=$(ls *.vsix)" >> "$GITHUB_OUTPUT"
      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          skipDuplicate: true
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          registryUrl: https://open-vsx.org
          extensionFile: ${{ steps.vsix.outputs.path }}

  deploy-vsmarketplace:
    name: Deploy to Visual Studio Marketplace
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Resolve VSIX path
        id: vsix
        run: echo "path=$(ls *.vsix)" >> "$GITHUB_OUTPUT"
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          skipDuplicate: true
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.path }}

  publish-github-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: |

            [Full changelog](https://github.com/sweetpad-dev/sweetpad/blob/main/CHANGELOG.md)
          files: "*.vsix"
