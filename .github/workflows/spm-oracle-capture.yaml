name: spm-oracle-capture

on:
  push:
    branches: [claude/sweetpad-spm-support-980eqm]
    paths:
      - ".github/workflows/spm-oracle-capture.yaml"
  workflow_dispatch:

# TEMPORARY: capture the SwiftPM CLI oracle fixtures on macOS runners (Xcode +
# Swift toolchain present), then commit them back to the feature branch. This
# grounds sweetpad's no-xcodebuild SPM path (src/cli/swiftpm.rs) against real
# `swift package dump-package` / `xcodebuild -list` / `swift build` / `swift test`.
#
# 16.4 is already committed; this run adds 15.4 and 26.5 so the oracle spans the
# corpus's three Xcode majors. Delete this workflow once the fixtures land.

permissions:
  contents: write

# Serialize: each matrix job commits to the same branch, so run them one at a
# time and rebase before pushing (they write disjoint xcode-<ver>/ dirs).
concurrency:
  group: spm-oracle-capture
  cancel-in-progress: false

jobs:
  capture:
    name: capture SPM oracle (Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, xcode: "15.4" }
          - { os: macos-15, xcode: "26.5" }
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/sweetpad-spm-support-980eqm

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          APP=$(ls -d /Applications/Xcode_${{ matrix.xcode }}*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$APP" ]; then
            echo "Xcode ${{ matrix.xcode }} not found on ${{ matrix.os }}; available:"
            ls -d /Applications/Xcode_*.app || true
            exit 1
          fi
          echo "Selecting $APP"
          sudo xcode-select -s "$APP/Contents/Developer"

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Tooling versions
        run: |
          xcodebuild -version
          swift --version
          rustc --version

      - name: Capture SPM oracle fixtures
        run: python3 scripts/22_spm_cli_oracle.py --current --force

      - name: Validate captures against our implementation
        run: cargo test --test spm_oracle

      - name: Commit captured fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/_synthetic-spm-cli
          if git diff --cached --quiet; then
            echo "No fixture changes to commit."
          else
            git commit -m "SPM oracle: capture fixtures on $(xcodebuild -version | head -1) [skip ci]"
            # Land on top of any sibling matrix job's commit (disjoint dirs).
            git pull --rebase origin claude/sweetpad-spm-support-980eqm
            git push origin HEAD:claude/sweetpad-spm-support-980eqm
          fi
