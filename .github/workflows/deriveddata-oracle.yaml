name: deriveddata-oracle

# TEMPORARY verification workflow (issue #285). Runs real `xcodebuild
# -showBuildSettings` on a macOS runner as the ground truth for Xcode's
# DerivedData folder naming (`<Name>-<hash>`) and asserts the in-process
# resolver computes a byte-identical BUILD_DIR across container shapes —
# bare project, the embedded `project.xcworkspace` stub (the #285 bug), a real
# sibling workspace, and a non-ASCII path (NFD probe). Remove once the path-hash
# behavior is confirmed and folded into the permanent oracle suite.
on:
  push:
    branches: [claude/issue-285-reproduce-test-37ypnx]
    paths:
      - "sweetpad-lib/**"
      - ".github/workflows/deriveddata-oracle.yaml"
  workflow_dispatch:

jobs:
  oracle:
    name: DerivedData path-hash differential
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sweetpad-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sweetpad-lib

      - name: Tooling versions
        run: |
          xcodebuild -version
          rustc --version
          python3 --version

      - name: Build the sweetpad CLI
        run: cargo build --bin sweetpad

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the fixture project
        working-directory: sweetpad-lib/ci/fixture-deriveddata
        run: xcodegen generate

      - name: DerivedData path-hash oracle
        env:
          SWEETPAD_BIN: ${{ github.workspace }}/sweetpad-lib/target/debug/sweetpad
        run: bash ci/deriveddata-oracle.sh
