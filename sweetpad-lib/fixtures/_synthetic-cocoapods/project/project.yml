name: App
options:
  bundleIdPrefix: com.example
targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.App
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    scheme: {}
