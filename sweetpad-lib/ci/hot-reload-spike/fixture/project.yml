# Minimal iOS app for the hot-reload socket spike (CLI_DESIGN §9d, Milestone 1).
# Built for the simulator with the two hot-reload build settings; the injection
# client is added at launch via DYLD_INSERT_LIBRARIES (not an SPM dependency),
# so the project itself stays a plain SwiftUI app. Generated on CI with
# `xcodegen generate`; the .xcodeproj is not committed.
name: HotReloadSpike
options:
  bundleIdPrefix: dev.sweetpad.spike
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.0"
    # The two settings hot reload needs (CLI_DESIGN §9d):
    #  -interposable lets dyld swap symbols at runtime;
    #  EMIT_FRONTEND_COMMAND_LINES makes the swift-frontend invocations appear
    #  in the build output so the server can recover the recompile command (A).
    OTHER_LDFLAGS: "$(inherited) -Xlinker -interposable"
    EMIT_FRONTEND_COMMAND_LINES: "YES"
    # Debug single-file builds keep the recovered command simple.
    SWIFT_COMPILATION_MODE: "singlefile"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"

targets:
  HotReloadSpike:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.spike.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  HotReloadSpike:
    build:
      targets:
        HotReloadSpike: all
    run:
      config: Debug
