# Minimal runnable iOS + macOS app used by the `cli-smoke` workflow to exercise
# the standalone `sweetpad` CLI against real xcodebuild/simctl. Generated on CI
# with XcodeGen (`xcodegen generate`); the resulting .xcodeproj is not committed.
name: SweetpadCIApp
options:
  bundleIdPrefix: dev.sweetpad.ci
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    # Simulator/unsigned builds don't need signing; keep CI free of provisioning.
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.0"
    # CI doesn't need the index store; skipping it speeds every xcodebuild here.
    COMPILER_INDEX_STORE_ENABLE: "NO"

targets:
  SweetpadCIApp:
    type: application
    platform: iOS
    sources:
      - Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.ci.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"

  SweetpadCIAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.ci.tests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: SweetpadCIApp

  # A macOS app target so `build`/`app run --mac` have a macOS scheme to use.
  # Reuses the same SwiftUI sources (SwiftUI is cross-platform).
  SweetpadCIMac:
    type: application
    platform: macOS
    sources:
      - Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sweetpad.ci.mac
        GENERATE_INFOPLIST_FILE: "YES"

# Explicit shared schemes so `sweetpad scheme list` / -scheme resolution find
# them (XcodeGen writes them to xcshareddata/xcschemes).
schemes:
  SweetpadCIApp:
    build:
      targets:
        SweetpadCIApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SweetpadCIAppTests
  SweetpadCIMac:
    build:
      targets:
        SweetpadCIMac: all
    run:
      config: Debug
